server {
    listen 80;
    server_name 118.178.186.196; # 您的域名

    # 前端静态资源路径
    location / {
        root   /www/sites/www.dyx.company/index; # dist 目录所在的绝对路径
        index  index.html index.htm;
        try_files $uri $uri/ /index.html; # Vue 路由支持，防止刷新 404
    }

    # 后台管理页（不在前台暴露入口，手动输入地址访问）
    location ^~ /dyx-manager/ {
        root   /www/sites/www.dyx.company/index;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 后台管理 API
    location ^~ /api/dyx-manager/ {
        proxy_pass http://localhost:8080/api/dyx-manager/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header User-Agent $http_user_agent;

        # 允许上传大文件
        client_max_body_size 50m;
    }

    # 其余后端 API 代理
    location /api/ {
        proxy_pass http://localhost:8080/api/; # 指向后端 Spring Boot 服务
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header User-Agent $http_user_agent;

        # 允许上传大文件
        client_max_body_size 50m;
    }

    # 后端媒体资源代理 (上传的图片等)
    location /media/ {
        proxy_pass http://localhost:8080/media/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header User-Agent $http_user_agent;
    }

    # 错误页面配置
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /www/sites/www.dyx.company/index;
    }

    # 开启 Gzip 压缩以提升前端加载速度
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}

# 当前后端 CORS 白名单建议与 WebMvcConfig 保持一致：
# - http://118.178.186.196
# - http://www.dyx.company
# - https://www.dyx.company
# - http://localhost:5173
# - http://127.0.0.1:5173
