server {
    listen 80;
    server_name dyx.company; # 您的域名

    # 前端静态资源路径
    location / {
        root   /opt/1panel/www/sites/dyx.company/index; # dist 目录所在的绝对路径
        index  index.html index.htm;
        try_files $uri $uri/ /index.html; # Vue 路由支持，防止刷新 404
    }

    # 后端 API 代理
    location /api/ {
        proxy_pass http://localhost:8080/api/; # 指向后端 Spring Boot 服务
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 允许上传大文件
        client_max_body_size 50m;
    }

    # 后端媒体资源代理 (上传的图片等)
    location /media/ {
        proxy_pass http://localhost:8080/media/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 错误页面配置
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /opt/1panel/www/sites/dyx.company/index;
    }

    # 开启 Gzip 压缩以提升前端加载速度
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
