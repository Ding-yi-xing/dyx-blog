#
# 使用说明：
# 1. 本文件适用于站点配置文件，不能再包一层 http {}。
# 2. 如果服务器上已经有可用站点，请把本文件中的限流区和 location 规则按需合并到现有配置，
#    不要直接覆盖 root、server_name、ssl_certificate、proxy_pass 等环境相关字段。
# 3. client_max_body_size 保持为 1024m，未调整上传限制。

# 按客户端 IP 做连接数与请求频率控制
limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;
limit_req_zone $binary_remote_addr zone=req_public_per_ip:20m rate=30r/m;
limit_req_zone $binary_remote_addr zone=req_login_per_ip:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=req_guestbook_per_ip:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=req_visit_per_ip:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=req_admin_per_ip:20m rate=20r/m;

server {
    listen 80;
    server_name www.dyx.company;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name www.dyx.company;

    ssl_certificate /www/sites/www.dyx.company/ssl/fullchain.pem;
    ssl_certificate_key /www/sites/www.dyx.company/ssl/privkey.pem;
    ssl_protocols TLSv1.3 TLSv1.2;
    ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-SHA384:ECDHE-RSA-AES128-SHA256:!aNULL:!eNULL:!EXPORT:!DSS:!DES:!RC4:!3DES:!MD5:!PSK:!KRB5:!SRP:!CAMELLIA:!SEED;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    server_tokens off;
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;
    keepalive_timeout 15s 15s;
    reset_timedout_connection on;

    limit_conn conn_per_ip 20;
    limit_req_status 429;
    limit_conn_status 429;

    add_header Strict-Transport-Security "max-age=31536000" always;
    error_page 497 https://$host$request_uri;

    # 前端静态资源路径
    location / {
        root /www/sites/www.dyx.company/index;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 后台管理页
    location ^~ /dyx-manager/ {
        root /www/sites/www.dyx.company/index;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
        limit_req zone=req_admin_per_ip burst=10 nodelay;
    }

    # 登录接口
    location = /api/auth/login {
        proxy_pass http://localhost:8050/api/auth/login;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header User-Agent $http_user_agent;

        limit_req zone=req_login_per_ip burst=5 nodelay;
        proxy_connect_timeout 5s;
        proxy_send_timeout 15s;
        proxy_read_timeout 15s;
    }

    # 访问统计接口：高频但允许静默丢弃
    location ~ ^/api/site/visit/ {
        proxy_pass http://localhost:8050;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header User-Agent $http_user_agent;

        limit_req zone=req_visit_per_ip burst=5 nodelay;
        proxy_connect_timeout 5s;
        proxy_send_timeout 15s;
        proxy_read_timeout 15s;
    }

    # 留言接口：超限时直接返回 429
    location = /api/site/guestbook/messages {
        proxy_pass http://localhost:8050/api/site/guestbook/messages;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header User-Agent $http_user_agent;

        limit_req zone=req_guestbook_per_ip burst=3 nodelay;
        proxy_connect_timeout 5s;
        proxy_send_timeout 15s;
        proxy_read_timeout 15s;
    }

    # 后台管理 API
    location ^~ /api/dyx-manager/ {
        proxy_pass http://localhost:8050/api/dyx-manager/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header User-Agent $http_user_agent;

        limit_req zone=req_admin_per_ip burst=15 nodelay;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # 保持原上传限制
        client_max_body_size 1024m;
    }

    # 其余后端 API
    location /api/ {
        proxy_pass http://localhost:8050/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header User-Agent $http_user_agent;

        limit_req zone=req_public_per_ip burst=20 nodelay;
        proxy_connect_timeout 5s;
        proxy_send_timeout 15s;
        proxy_read_timeout 15s;

        # 保持原上传限制
        client_max_body_size 1024m;
    }

    # 后端媒体资源代理
    location /media/ {
        proxy_pass http://localhost:8050/media/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header User-Agent $http_user_agent;

        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /www/sites/www.dyx.company/index;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}

