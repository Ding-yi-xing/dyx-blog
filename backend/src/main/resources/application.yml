server:
  port: 8080

spring:
  application:
    name: dyx-blog
  datasource:
    url: jdbc:mysql://localhost:3306/dyx_blog?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  web:
    resources:
      static-locations: classpath:/static/,file:uploads/

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id

logging:
  level:
    com.dyx.blog: info

jwt:
  secret: dyx-blog-secret-key-dyx-blog-secret-key
  expire-hours: 24

file:
  upload-path: uploads/
  access-prefix: /media/


