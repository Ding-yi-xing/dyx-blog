server:
  port: 8080

spring:
  profiles:
    active: prod# 默认激活开发环境配置
  application:
    name: dyx-blog
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://118.178.186.196:8060/dyx_blog?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${MYSQL_USER:dyx_blog}
    password: ${MYSQL_PWD:Dyx@blog}
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 2GB
      max-request-size: 2GB
  web:
    resources:
      static-locations: classpath:/static/,file:uploads/

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id

logging:
  level:
    com.dyx.blog: info

jwt:
  secret: ${JWT_SECRET:dyx-blog-prod-secret-key-at-least-32-chars-long!!!}
  expire-hours: 24

file:
  upload-path: uploads/
  access-prefix: /media/

dyx:
  security:
    encrypt-key: dyx-blog-prod-encrypt-key-32chars!!!
    cors-allowed-origins:
      - http://118.178.186.196
      - http://localhost:*
      - http://127.0.0.1:*
      - http://[::1]:*
      - http://192.168.*:*
      - http://10.*:*
      - http://172.*:*
      - http://www.dyx.company:*
      - https://www.dyx.company:*
      - https://dyx.company:*
      - http://dyx.company:*
