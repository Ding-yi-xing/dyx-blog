server:
  port: 8080

spring:
  jackson:
    time-zone: Asia/Shanghai
  application:
    name: dyx-blog
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/dyx_blog?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${MYSQL_USER:}
    password: ${MYSQL_PWD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 1GB
      max-request-size: 1GB
  web:
    resources:
      static-locations: classpath:/static/,file:uploads/
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:127.0.0.1}
      port: ${SPRING_DATA_REDIS_PORT:6379}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id

logging:
  level:
    com.dyx.blog: info

jwt:
  secret: ${JWT_SECRET}
  expire-hours: 24

file:
  upload-path: uploads/
  access-prefix: /media/
  max-upload-size-bytes: 1073741824

dyx:
  security:
    encrypt-key: ${DYX_ENCRYPT_KEY}
    cors-allowed-origins:
      - http://localhost:*
      - http://127.0.0.1:*
      - http://[::1]:*
      - http://192.168.*:*
      - http://10.*:*
      - http://172.*:*
      - http://www.dyx.company:*
      - https://www.dyx.company:*
      - https://dyx.company:*
      - http://dyx.company:*
