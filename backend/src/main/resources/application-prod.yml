# 生产环境配置
server:
  port: 8080

spring:
  application:
    name: dyx-blog
  datasource:
    # 请根据实际服务器 MySQL 配置修改地址、用户名和密码
    url: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/dyx_blog?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER}
    password: ${MYSQL_PWD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  web:
    resources:
      static-locations: classpath:/static/,file:uploads/

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    # 生产环境关闭 SQL 打印以提升性能
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    db-config:
      id-type: assign_id

logging:
  level:
    root: info
    com.dyx.blog: info
  file:
    name: logs/dyx-blog-prod.log

jwt:
  # 强烈建议在生产环境通过环境变量设置密钥
  secret: ${JWT_SECRET}
  expire-hours: 72

file:
  # 生产环境上传路径（相对于 jar 包所在目录）
  upload-path: uploads/
  access-prefix: /media/

dyx:
  security:
    # 强烈建议在生产环境通过环境变量设置加密密钥
    encrypt-key: ${ENCRYPT_KEY}
    cors-allowed-origins:
      - http://118.178.186.196
      - http://localhost:*
      - http://127.0.0.1:*
      - http://[::1]:*
      - http://192.168.*:*
      - http://10.*:*
      - http://172.*:*
      - http://www.dyx.company:*
      - https://www.dyx.company:*
      - https://dyx.company:*
      - http://dyx.company:*
